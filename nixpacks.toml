[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm ci --include=dev --include=optional --include-workspace-root"
]

[variables]
NPM_CONFIG_PRODUCTION = "false"
NPM_CONFIG_INCLUDE = "optional"

[phases.build]
cmds = [
  "npm run build --workspace=web"
]

[start]
cmd = "npm run start --workspace=web"
