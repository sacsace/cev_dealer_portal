# Railway config for the **api** service.
# Service Settings → Config file path: railway.api.toml

[build]
builder = "NIXPACKS"

[build.nixpacksPlan]
providers = ["node"]

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_22"]

[build.nixpacksPlan.phases.install]
dependsOn = ["setup"]
cmds = [
  "npm ci --include=dev --include-workspace-root --ignore-scripts",
]

[build.nixpacksPlan.phases.build]
dependsOn = ["install"]
cmds = [
  "npm run db:generate",
  "npm run build --workspace=api",
]

[deploy]
startCommand = "npm run db:migrate:deploy && npm run start:prod --workspace=api"
healthcheckPath = "/api"
healthcheckTimeout = 120

[variables]
NODE_ENV = "production"
