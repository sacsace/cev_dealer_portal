# Railway config for the **api** service.
# Service Settings → Config-as-code → railway.api.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
startCommand = "npm run db:migrate:deploy && npm run start:prod --workspace=api"
healthcheckPath = "/api"
healthcheckTimeout = 120

[variables]
NODE_ENV = "production"
NPM_CONFIG_INCLUDE = "optional"
